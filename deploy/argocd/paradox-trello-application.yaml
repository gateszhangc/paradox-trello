apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paradox-trello
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gateszhangc/paradox-trello.git
    targetRevision: main
    path: deploy/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: paradox-trello
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
